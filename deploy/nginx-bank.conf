# Bank Discrepancies — nginx reverse proxy
# Deploy to: /etc/nginx/conf.d/zz-bank.conf  on the EC2 instance.
# Co-hosts on the same box as supplierinvoice (separate server_name + port).
# Sits behind Cloudflare (proxied). Cloudflare terminates end-user TLS;
# the Let's Encrypt cert below secures the Cloudflare → origin hop.
#
# >>> Replace bank.newavera.co.il with your real subdomain before deploying. <<<

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name bank.newavera.co.il;
    return 301 https://bank.newavera.co.il$request_uri;
}

# HTTPS reverse proxy → gunicorn on 127.0.0.1:5000
server {
    listen 443 ssl;
    server_name bank.newavera.co.il;

    # Reuse the existing wildcard/shared Let's Encrypt cert on the box,
    # or issue a dedicated one:  sudo certbot --nginx -d bank.newavera.co.il
    ssl_certificate     /etc/letsencrypt/live/land.newavera.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/land.newavera.co.il/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }
}
