# Bank Discrepancies — nginx reverse proxy
# Deploy to: /etc/nginx/conf.d/zz-bank.conf  on the EC2 instance.
# Public URL: https://bank-discrepancies.newavera.co.il
#
# This is an HTTP-only SEED. It is safe to load without any TLS cert, so it
# can't break sibling sites on the box. Run certbot to add the HTTPS block:
#
#     sudo certbot --nginx -d bank-discrepancies.newavera.co.il
#
# certbot rewrites this file to add a `listen 443 ssl` server with the issued
# Let's Encrypt cert and an HTTP→HTTPS redirect.

server {
    listen 80;
    server_name bank-discrepancies.newavera.co.il;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }
}
