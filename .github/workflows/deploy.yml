name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/server/bank-discrepancies pull --ff-only

      - name: Install dependencies
        run: npm --prefix ~/server/bank-discrepancies ci

      - name: Build frontend
        run: npm --prefix ~/server/bank-discrepancies run build

      - name: Rebuild & restart container
        run: |
          cd ~/server/bank-discrepancies
          ~/.orbstack/bin/docker compose build
          ~/.orbstack/bin/docker compose up -d
